<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亚洲文旅智搜 - 文旅项目智能搜索与研判平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #080c14; --bg-elevated: #0f1520; --card: #141d2e; --card-hover: #1a2540; --border: #1e2d4a; --accent: #d4a24e; --accent-glow: rgba(212,162,78,0.3); --accent2: #2dd4a8; --accent2-glow: rgba(45,212,168,0.2); --fg: #e8eaf0; --fg-muted: #7a8ba8; --danger: #ef4444; --warning: #f59e0b; --success: #22c55e; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; overflow-x: hidden; }
        h1, h2, h3, .serif { font-family: 'Noto Serif SC', serif; }
        .grid-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(30,45,74,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(30,45,74,0.3) 1px, transparent 1px); background-size: 60px 60px; }
        .grid-bg::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(212,162,78,0.06) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(45,212,168,0.04) 0%, transparent 40%); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        .search-glow { box-shadow: 0 0 0 1px var(--border), 0 0 40px var(--accent-glow); transition: box-shadow 0.4s; }
        .search-glow:focus-within { box-shadow: 0 0 0 2px var(--accent), 0 0 60px var(--accent-glow), 0 0 120px rgba(212,162,78,0.1); }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.6; } 100% { transform: scale(1.8); opacity: 0; } }
        .pulse-ring::before, .pulse-ring::after { content: ''; position: absolute; inset: -8px; border: 2px solid var(--accent); border-radius: inherit; animation: pulse-ring 2s ease-out infinite; }
        .pulse-ring::after { animation-delay: 1s; }
        @keyframes crawl { 0% { width: 0; } 100% { width: 100%; } }
        .crawl-bar { animation: crawl var(--duration, 2s) ease-out forwards; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal-content { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 16px; max-width: 1000px; width: 100%; max-height: 85vh; overflow-y: auto; animation: modalIn 0.3s ease; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .toast-container { position: fixed; top: 80px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
        .toast { padding: 12px 20px; border-radius: 10px; font-size: 14px; color: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.4); animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; display: flex; align-items: center; gap: 8px; }
        .toast.success { background: linear-gradient(135deg, #065f46, #047857); border: 1px solid #10b981; }
        .toast.info { background: linear-gradient(135deg, #1e3a5f, #1e40af); border: 1px solid #3b82f6; }
        .toast.warning { background: linear-gradient(135deg, #78350f, #92400e); border: 1px solid #f59e0b; }
        .toast.danger { background: linear-gradient(135deg, #7f1d1d, #b91c1c); border: 1px solid #ef4444; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateX(60px); } }
        .crawl-node { animation: nodePulse 1.5s infinite; }
        @keyframes nodePulse { 0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); } 50% { box-shadow: 0 0 0 8px transparent; } }
        .project-card { transition: all 0.3s ease; border: 1px solid var(--border); }
        .project-card:hover { border-color: var(--accent); box-shadow: 0 0 30px var(--accent-glow), 0 8px 32px rgba(0,0,0,0.4); transform: translateY(-4px); }
        .tag { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; }
        .tab-btn { padding: 10px 20px; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.3s; color: var(--fg-muted); font-size: 14px; white-space: nowrap; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-btn:hover:not(.active) { color: var(--fg); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: fadeSlide 0.3s ease; }
        .source-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .source-badge:hover { transform: scale(1.05); }
        .source-badge.active { border-color: currentColor; }
        .source-xhs { background: rgba(255,44,85,0.15); color: #ff2d55; }
        .source-wechat { background: rgba(7,193,96,0.15); color: #07c160; }
        .source-douyin { background: rgba(37,244,238,0.15); color: #25f4ee; }
        .source-web { background: rgba(59,130,246,0.15); color: #3b82f6; }
        .source-weibo { background: rgba(230,36,41,0.15); color: #e62429; }
        .source-bilibili { background: rgba(0,161,214,0.15); color: #00a1d6; }
        .highlight-match { background: rgba(212,162,78,0.25); color: var(--accent); padding: 0 2px; border-radius: 2px; }
        @media (max-width: 768px) { .hero-title { font-size: 2rem !important; } }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="toast-container" id="toastContainer"></div>
    
    <nav style="position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(8,12,20,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);">
        <div style="max-width:1400px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;">
            <div style="display:flex;align-items:center;gap:12px;">
                <div style="width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#e8c878);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#080c14;" class="serif">亚</div>
                <div>
                    <div style="font-size:16px;font-weight:700;letter-spacing:1px;" class="serif">亚洲文旅智搜</div>
                    <div style="font-size:10px;color:var(--fg-muted);letter-spacing:2px;">ASIA CULTURAL INTELLIGENCE</div>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:16px;">
                <a href="https://notebooklm.google.com/" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:6px;padding:8px 16px;background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-size:13px;font-weight:600;text-decoration:none;transition:all 0.3s;" onmouseover="this.style.background='linear-gradient(135deg,var(--accent),#e8c878)';this.style.color='#080c14'" onmouseout="this.style.background='linear-gradient(135deg,#1a1a2e,#16213e)';this.style.color='var(--accent)'">
                    <i class="fab fa-google"></i> <span>NotebookLM</span> <i class="fas fa-external-link-alt" style="font-size:10px;"></i>
                </a>
                <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--fg-muted);">
                    <span class="status-dot online"></span> <span>引擎在线</span>
                </div>
            </div>
        </div>
    </nav>

    <main id="mainContent" style="position:relative;z-index:1;">
        <!-- 1. 首页 -->
        <section id="heroSection" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px 40px;transition:all 0.5s ease;">
            <div style="text-align:center;margin-bottom:48px;">
                <div style="font-size:14px;color:var(--accent);letter-spacing:6px;margin-bottom:16px;font-weight:500;">CULTURAL TOURISM INTELLIGENCE</div>
                <h1 class="serif hero-title" style="font-size:3.5rem;font-weight:900;line-height:1.2;margin-bottom:16px;">
                    <span style="color:var(--fg);">亚洲文旅</span><span style="color:var(--accent);">智搜</span>
                </h1>
                <p style="font-size:18px;color:var(--fg-muted);max-width:600px;margin:0 auto;line-height:1.8;">
                    聚合全网数据源，智能搜索亚洲文旅项目全维度信息<br>
                    一键研判 · 报告生成 · 投喂 NotebookLM
                </p>
            </div>
            
            <!-- 搜索框 -->
            <div class="search-glow" style="width:min(700px,90%);background:var(--card);border-radius:16px;padding:6px;position:relative;" id="searchBox">
                <div style="display:flex;align-items:center;">
                    <i class="fas fa-search" style="padding:0 16px;color:var(--accent);font-size:18px;"></i>
                    <input type="text" id="searchInput" placeholder="输入文旅项目、投资商、关键词..." style="flex:1;background:none;border:none;outline:none;color:var(--fg);font-size:16px;padding:14px 0;font-family:inherit;" aria-label="搜索关键词" autocomplete="off">
                    <!-- FIX: 明确绑定 onclick -->
                    <button onclick="handleSearchClick()" id="searchBtn" style="padding:14px 28px;background:linear-gradient(135deg,var(--accent),#e8c878);color:#080c14;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.3s;font-family:inherit;" onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform='scale(1)'">
                        智能搜索
                    </button>
                </div>
            </div>

            <!-- 数据源勾选 -->
            <div style="margin-top:24px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:700px;" id="sourceSelector">
                <span class="source-badge source-xhs active" data-source="xiaohongshu" onclick="toggleSource(this)"> <i class="fas fa-book-open"></i> 小红书 </span>
                <span class="source-badge source-wechat active" data-source="wechat" onclick="toggleSource(this)"> <i class="fab fa-weixin"></i> 微信 </span>
                <span class="source-badge source-douyin active" data-source="douyin" onclick="toggleSource(this)"> <i class="fab fa-tiktok"></i> 抖音 </span>
                <span class="source-badge source-web active" data-source="website" onclick="toggleSource(this)"> <i class="fas fa-globe"></i> 网站 </span>
                <span class="source-badge source-weibo active" data-source="weibo" onclick="toggleSource(this)"> <i class="fab fa-weibo"></i> 微博 </span>
            </div>

            <!-- 热门标签 -->
            <div style="margin-top:32px;text-align:center;">
                <div style="font-size:12px;color:var(--fg-muted);margin-bottom:12px;">热门搜索</div>
                <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;" id="hotTags">
                    <span class="tag" style="background:var(--card);color:var(--fg);" onclick="quickSearch('迪士尼')">迪士尼</span>
                    <span class="tag" style="background:var(--card);color:var(--fg);" onclick="quickSearch('环球影城')">环球影城</span>
                    <span class="tag" style="background:var(--card);color:var(--fg);" onclick="quickSearch('长隆')">长隆</span>
                    <span class="tag" style="background:var(--card);color:var(--fg);" onclick="quickSearch('华侨城')">华侨城</span>
                </div>
            </div>

            <!-- 统计数字 -->
            <div style="margin-top:48px;display:flex;gap:40px;justify-content:center;flex-wrap:wrap;">
                <div style="text-align:center;"><div style="font-size:28px;font-weight:900;color:var(--accent);" class="serif">10+</div><div style="font-size:12px;color:var(--fg-muted);">标杆案例</div></div>
                <div style="text-align:center;"><div style="font-size:28px;font-weight:900;color:var(--accent2);" class="serif">6</div><div style="font-size:12px;color:var(--fg-muted);">数据源</div></div>
                <div style="text-align:center;"><div style="font-size:28px;font-weight:900;color:var(--fg);" class="serif">∞</div><div style="font-size:12px;color:var(--fg-muted);">智能报告</div></div>
            </div>
        </section>

        <!-- 2. 结果页 -->
        <section id="resultsSection" style="display:none;padding:80px 20px 60px;max-width:1400px;margin:0 auto;">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:24px;">
                <div style="display:flex;align-items:center;gap:12px;">
                    <button onclick="resetSearch()" style="padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--fg);cursor:pointer;font-family:inherit;font-size:13px;transition:all 0.2s;">
                        <i class="fas fa-arrow-left"></i> 重新搜索
                    </button>
                    <div style="font-size:14px;color:var(--fg-muted);">
                        搜索 "<span id="searchKeyword" style="color:var(--accent);font-weight:600;"></span>" 共找到 <span id="resultCount" style="color:var(--accent2);font-weight:600;"></span> 条结果
                    </div>
                </div>
                <button onclick="generateReport()" id="genReportBtn" style="padding:10px 24px;background:linear-gradient(135deg,var(--accent2),#14b8a6);color:#080c14;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;transition:all 0.3s;">
                    <i class="fas fa-chart-bar"></i> 生成研判报告
                </button>
            </div>

            <!-- 爬取进度 -->
            <div id="crawlPanel" style="display:none;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px;">
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
                    <i class="fas fa-spider" style="color:var(--accent);font-size:18px;"></i>
                    <span style="font-weight:700;font-size:15px;">全网数据采集中...</span>
                    <span class="status-dot crawling"></span>
                </div>
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;" id="crawlProgressList"></div>
            </div>

            <!-- 结果列表 -->
            <div id="resultsList" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:20px;"></div>
        </section>

        <!-- 3. 报告页 -->
        <section id="reportSection" style="display:none;padding:0 20px 60px;max-width:1400px;margin:0 auto;">
            <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;position:relative;">
                <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:24px;">
                    <div>
                        <h2 class="serif" style="font-size:24px;font-weight:900;color:var(--accent);margin-bottom:4px;">
                            <i class="fas fa-chart-line" style="margin-right:8px;"></i>综合研判分析报告
                        </h2>
                        <div style="font-size:13px;color:var(--fg-muted);" id="reportMeta"></div>
                    </div>
                    <div style="display:flex;gap:10px;">
                        <button onclick="copyReport()" style="padding:10px 20px;background:var(--card);border:1px solid var(--accent);border-radius:8px;color:var(--accent);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;">
                            <i class="fas fa-copy"></i> 一键复制
                        </button>
                        <button onclick="feedToNotebookLM()" style="padding:10px 20px;background:linear-gradient(135deg,var(--accent),#e8c878);color:#080c14;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;">
                            <i class="fab fa-google"></i> 投喂 NotebookLM
                        </button>
                    </div>
                </div>
                <div id="reportContent" style="line-height:1.9;font-size:14px;"></div>
            </div>
        </section>
    </main>

    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeModal()">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        // ========== 核心修正：使用 DOMContentLoaded 确保页面加载完毕后再绑定事件 ==========
        document.addEventListener('DOMContentLoaded', function() {
            console.log("页面脚本已加载"); // 打开浏览器控制台，看到这句话说明JS生效了
            
            initPage();
        });

        // ========== 全局状态 ==========
        const activeSources = new Set(['xiaohongshu', 'wechat', 'douyin', 'website', 'weibo', 'bilibili']);
        let window_searchData = null;
        let window_finalReport = null;
        let window_finalLinks = null;

        // ========== 初始化页面数据 ==========
        function initPage() {
            document.getElementById('statProjects').innerText = "10+";
            document.getElementById('statSources').innerText = "6";
            document.getElementById('statReports').innerText = "∞";
            document.getElementById('statData').innerText = "实时";

            // 绑定回车键事件
            const inputEl = document.getElementById('searchInput');
            if(inputEl) {
                inputEl.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') handleSearchClick();
                });
            }
        }

        // ========== 交互功能 ==========
        function toggleSource(el) {
            const source = el.dataset.source;
            el.classList.toggle('active');
            if (activeSources.has(source)) activeSources.delete(source);
            else activeSources.add(source);
        }

        function quickSearch(keyword) {
            const input = document.getElementById('searchInput');
            if(input) input.value = keyword;
            handleSearchClick();
        }

        function resetSearch() {
            document.getElementById('heroSection').style.display = 'flex';
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('reportSection').style.display = 'none';
        }

        function showToast(msg, type='info') {
            const container = document.getElementById('toastContainer');
            if(!container) return;
            const div = document.createElement('div');
            div.className = 'toast ' + type;
            div.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
            container.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function openModal(item) {
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('modalContent');
            const title = item.title || '项目详情';
            const desc = item.content ? item.content.substring(0, 500) + '...' : '暂无详细描述';
            const url = item.url || '#';
            
            content.innerHTML = `
                <div style="padding:24px;">
                    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:20px;">
                        <h2 class="serif" style="font-size:22px;font-weight:900;color:var(--accent);">${title}</h2>
                        <button onclick="closeModal()" style="background:none;border:none;font-size:28px;color:var(--fg-muted);cursor:pointer;">&times;</button>
                    </div>
                    <div style="background:var(--bg);padding:16px;border-radius:8px;line-height:1.8;color:var(--fg-muted);font-size:14px;white-space: pre-wrap;">${desc}</div>
                    <div style="margin-top:16px;">
                        <a href="${url}" target="_blank" style="color:var(--accent2);display:flex;align-items:center;gap:6px;">
                            <i class="fas fa-external-link-alt"></i> 查看原始页面
                        </a>
                    </div>
                </div>
            `;
            modal.classList.add('show');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('show');
        }

        // ========== 核心修复：统一的搜索触发函数 ==========
        function handleSearchClick() {
            startSearch(); // 明确调用异步搜索函数
        }

        // ========== 搜索逻辑 (API 调用) ==========
        async function startSearch() {
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) return showToast('请输入关键词', 'warning');

            // 界面切换
            document.getElementById('heroSection').style.display = 'none';
            document.getElementById('resultsSection').style.display = 'block';
            document.getElementById('reportSection').style.display = 'none';
            document.getElementById('searchKeyword').innerText = keyword;
            document.getElementById('resultsList').innerHTML = '';
            document.getElementById('crawlPanel').style.display = 'block'; // 显示进度条

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        keyword: keyword,
                        activeSources: Array.from(activeSources) // 关键：转为数组
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                
                // 存储数据
                window_searchData = data;
                const items = data.tavilyData?.results || [];
                
                // 更新UI
                document.getElementById('resultCount').innerText = items.length;
                document.getElementById('crawlPanel').style.display = 'none'; // 隐藏进度条

                if (items.length === 0) {
                    document.getElementById('resultsList').innerHTML = 
                        '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--fg-muted);">未找到相关结果，请换关键词试试</div>';
                    return;
                }

                // 渲染结果
                renderResults(items);
                showToast(`找到 ${items.length} 条结果`, 'success');

            } catch (error) {
                console.error("搜索失败:", error);
                document.getElementById('crawlPanel').style.display = 'none';
                showToast('搜索失败: ' + error.message, 'danger');
            }
        }

        // 渲染结果卡片
        function renderResults(items) {
            const list = document.getElementById('resultsList');
            list.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'project-card bg-[var(--card)] rounded-xl p-6 flex flex-col gap-3 cursor-pointer';
                card.onclick = () => openModal(item);

                const title = item.title || '未知标题';
                const content = item.content || '暂无摘要';
                const url = item.url || '#';
                
                const kw = document.getElementById('searchInput').value;
                const safeTitle = kw ? title.replace(new RegExp(kw, 'gi'), `<span class="highlight-match">${kw}</span>`) : title;

                card.innerHTML = `
                    <div style="font-size:16px;font-weight:700;color:var(--fg);line-height:1.4;">${safeTitle}</div>
                    <div style="font-size:13px;color:var(--fg-muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;">${content}</div>
                    <div style="margin-top:auto;display:flex;justify-content:space-between;align-items:center;font-size:12px;">
                        <span style="color:var(--accent);"><i class="fas fa-globe"></i> Tavily Source</span>
                        <a href="${url}" target="_blank" style="color:var(--accent2);">查看来源 <i class="fas fa-external-link-alt"></i></a>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // ========== 报告生成 ==========
        async function generateReport() {
            if (!window_searchData) return showToast('请先进行搜索', 'warning');

            const btn = document.getElementById('genReportBtn');
            const oldHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> AI分析中...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        keyword: window_searchData.keyword,
                        tavilyData: window_searchData.tavilyData,
                        socialData: window_searchData.socialData,
                        linkList: window_searchData.linkList
                    })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '生成失败');

                window_finalReport = data.report;
                window_finalLinks = window_searchData.linkList;

                // 展示报告
                document.getElementById('reportSection').style.display = 'block';
                document.getElementById('reportContent').innerHTML = data.report;
                document.getElementById('reportMeta').innerText = `关键词: ${window_searchData.keyword} | 来源数: ${window_searchData.linkList?.split('\n').filter(l => l.startsWith('http')).length || 0}`;
                
                // 滚动到顶部
                window.scrollTo({ top: 0, behavior: 'smooth' });
                showToast('报告生成成功', 'success');

            } catch (error) {
                showToast('生成失败: ' + error.message, 'danger');
            } finally {
                btn.innerHTML = oldHtml;
                btn.disabled = false;
            }
        }

        // ========== 报告复制与投喂 ==========
        function copyReport() {
            if (!window_finalReport) return showToast('无内容可复制', 'warning');
            
            const text = window_finalReport.replace(/<[^>]*>/g, '') + "\n\n===== 来源链接 =====\n" + (window_finalLinks || 'N/A');
            
            navigator.clipboard.writeText(text).then(() => {
                showToast('内容已复制到剪贴板', 'success');
            }).catch(() => {
                // 降级方案
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('内容已复制', 'success');
            });
        }

        function feedToNotebookLM() {
            copyReport(); // 先复制
            window.open('https://notebooklm.google.com/', '_blank'); // 再打开
        }
    </script>
</body>
</html>
