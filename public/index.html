<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文旅大视界 - CULTURAL PANORAMA (REAL DATA)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0e17; --card: #151b2b; --border: #1e2a42; --accent: #c9a227; --fg: #e4e8f0; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans SC', sans-serif; }
        body { background: var(--bg); color: var(--fg); min-height: 100vh; }
        .serif { font-family: 'Noto Serif SC', serif; }
        .proj-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .img-belt { display: flex; gap: 6px; padding-top: 8px; overflow-x: auto; }
        .img-belt img { width: 80px; height: 60px; object-fit: cover; border-radius: 4px; flex-shrink: 0; border: 1px solid #333; }
    </style>
</head>
<body>
    <nav style="position:sticky;top:0;z-index:50;background:rgba(10,14,23,0.98);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:15px 20px;">
        <div style="max-width:1000px;margin:0 auto;display:flex;align-items:center;gap:12px;">
            <div style="width:30px;height:30px;background:var(--accent);border-radius:6px;display:grid;place-items:center;font-weight:900;color:#000;font-size:16px;" class="serif">真</div>
            <span style="font-weight:700;font-size:16px;" class="serif">文旅大视界 (硬核爬虫版)</span>
        </div>
    </nav>

    <main style="max-width:1000px;margin:0 auto;padding:40px 20px;">
        <div style="text-align:center;margin-bottom:40px;">
            <h1 class="serif" style="font-size:2.2rem;margin-bottom:8px;">深网数据 · 实时抓取</h1>
            <p style="color:#666;font-size:13px;">拒绝缓存 · 拒绝模拟 · 只拿一手真实网页数据</p>
        </div>

        <div style="display:flex;gap:10px;margin-bottom:30px;">
            <input id="kwInput" placeholder="例如：大唐不夜城 宽窄巷子..." style="flex:1;padding:14px 20px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--fg);outline:none;font-size:15px;">
            <button onclick="runSearch()" style="padding:14px 30px;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer;">立即检索</button>
        </div>

        <!-- 错误提示区 -->
        <div id="errorZone" style="display:none;background:#2a1010;border:1px solid var(--danger);color:var(--danger);padding:15px;border-radius:8px;margin-bottom:20px;"></div>

        <!-- 迈点榜单展示 -->
        <div id="mideanZone" style="display:none;background:var(--card);border:1px solid var(--border);padding:15px;border-radius:10px;margin-bottom:20px;">
            <h3 style="color:var(--accent);font-size:14px;margin-bottom:10px;">🔥 迈点实时榜单</h3>
            <div id="mideanList" style="display:flex;flex-wrap:wrap;gap:10px;"></div>
        </div>

        <!-- 图片展示 -->
        <div id="imgZone" style="display:none;background:var(--card);border:1px solid var(--border);padding:15px;border-radius:10px;margin-bottom:20px;">
            <h3 style="color:var(--accent);font-size:14px;margin-bottom:10px;">📸 官网实拍</h3>
            <div id="imgBelt" class="img-belt"></div>
        </div>

        <!-- 结果卡片 -->
        <div id="resultGrid" style="display:grid;grid-template-columns:1fr;gap:20px;"></div>

        <!-- 报告生成按钮 -->
        <button id="genBtn" onclick="genReport()" style="width:100%;margin-top:30px;padding:16px;background:var(--card);border:1px solid var(--border);color:var(--fg);border-radius:8px;cursor:pointer;font-weight:600;display:none;" class="serif">生成智库级研判报告</button>

        <!-- 报告展示 -->
        <div id="reportArea" style="display:none;margin-top:30px;background:var(--card);border:1px solid var(--border);padding:30px;border-radius:10px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid var(--border);">
                <h2 class="serif">文旅大视界 | 研究报告</h2>
                <button onclick="copyReport()" style="padding:8px 16px;background:var(--accent);color:#000;border:none;border-radius:4px;font-size:13px;">复制文本</button>
            </div>
            <pre id="reportText" style="white-space: pre-wrap; line-height:1.8; color: #ccc; font-family: 'Noto Serif SC', serif;"></pre>
        </div>
    </main>

    <script>
        const $ = id => document.getElementById(id);
        let cache = { data: null, kw: '' };

        function showError(msg) {
            const el = $('errorZone');
            el.style.display = 'block';
            el.innerText = '⚠️ ' + msg;
        }
        function hideError() { $('errorZone').style.display = 'none'; }

        async function runSearch() {
            const kw = $('kwInput').value.trim();
            if (!kw) return alert('请输入');
            cache.kw = kw;
            hideError();
            
            // Reset UI
            $('mideanZone').style.display = 'none';
            $('imgZone').style.display = 'none';
            $('resultGrid').innerHTML = '<p style="color:#888;padding:40px;text-align:center;">🚧 正在硬核抓取迈点、政府网及项目官网真实数据中...</p>';

            try {
                const res = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keyword: kw })
                });
                
                const json = await res.json();

                // 处理真实错误
                if (!res.ok || json.error) {
                    throw new Error(json.error || `HTTP ${res.status}`);
                }

                cache.data = json;
                
                // 1. 展示迈点榜单
                if (json.realCrawlContext?.mideanRank?.list?.length > 0) {
                    $('mideanZone').style.display = 'block';
                    $('mideanList').innerHTML = json.realCrawlContext.mideanRank.list.map(item => 
                        `<span style="background:#222;padding:5px 10px;border-radius:4px;font-size:14px;border:1px solid #333;">${item.rank}. ${item.name}</span>`
                    ).join('');
                }

                // 2. 展示官网图片 (如果爬到了)
                const imgs = json.tavilyData.results?.[0]?.real_images || json.realCrawlContext?.officialImgs?.images || [];
                if (imgs.length > 0) {
                    $('imgZone').style.display = 'block';
                    $('imgBelt').innerHTML = imgs.map(src => `<img src="${src}" onerror="this.style.display='none'">`).join('');
                }

                // 3. 渲染搜索结果卡片
                $('resultGrid').innerHTML = json.tavilyData.results.map(item => `
                    <div class="proj-card">
                        <div style="padding:15px;">
                            <div style="color:var(--accent);font-size:12px;margin-bottom:5px;">${item.url?.split('/')[2] || '来源'}</div>
                            <div style="font-weight:700;font-size:16px;margin-bottom:8px;">${item.title}</div>
                            <div style="color:#aaa;font-size:13px;line-height:1.5;">${item.content?.substring(0, 200) || ''}...</div>
                        </div>
                    </div>
                `).join('');

                // 显示报告按钮
                $('genBtn').style.display = 'block';

            } catch (e) {
                console.error(e);
                showError(e.message + " —— 请重试或检查 Tavily Key 是否有效");
                $('resultGrid').innerHTML = '';
            }
        }

        async function genReport() {
            if (!cache.data) return;
            $('genBtn').disabled = true;
            $('genBtn').innerText = '🧠 AI 深度分析中...';
            $('reportArea').style.display = 'none';

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        keyword: cache.kw,
                        tavilyData: cache.data.tavilyData,
                        realCrawlContext: cache.data.realCrawlContext
                    })
                });
                const json = await res.json();
                if (!res.ok) throw new Error(json.error);

                $('reportArea').style.display = 'block';
                $('reportText').innerText = json.report;
                $('genBtn').style.display = 'none';
                
            } catch (e) {
                alert('生成失败: ' + e.message);
            } finally {
                $('genBtn').disabled = false;
                $('genBtn').innerText = '生成智库级研判报告';
            }
        }

        function copyReport() {
            navigator.clipboard.writeText($('reportText').innerText).then(() => alert('已复制'));
        }
    </script>
</body>
</html>
