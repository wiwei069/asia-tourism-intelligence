<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亚洲文旅智搜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #080c14; --card: #141d2e; --border: #1e2d4a; --accent: #d4a24e; --fg: #e8eaf0; --fg-muted: #7a8ba8; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; }
        .grid-bg { position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(30,45,74,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(30,45,74,0.3) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
        .project-card { border: 1px solid var(--border); transition: all 0.3s; }
        .project-card:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(212,162,78,0.2); }
        .pill { padding: 4px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.2s; display: inline-block; margin: 2px; border: 1px solid transparent; }
        .pill:hover { transform: translateY(-1px); }
        .pill.active { border-color: var(--accent); background: rgba(212,162,78,0.1); }
        .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; color: white; z-index: 9999; animation: slideIn 0.3s ease; }
        .toast.success { background: #059669; }
        .toast.error { background: #ef4444; }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .modal { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal.show { display: flex; }
        .modal-content { background: var(--card); border: 1px solid var(--border); border-radius: 12px; max-width: 800px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 24px; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div id="toast-root"></div>

    <nav style="position: sticky; top: 0; z-index: 50; background: rgba(8,12,20,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);">
        <div style="max-width: 900px; margin: 0 auto; padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between;">
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="width:32px; height:32px; background: var(--accent); border-radius: 6px; display:grid; place-items:center; font-weight:900; color:#000; font-size:14px;">亚</div>
                <span style="font-weight:700; font-family: 'Noto Serif SC';">文旅智搜</span>
            </div>
            <a href="https://notebooklm.google.com/" target="_blank" style="font-size:12px; color:var(--accent); text-decoration:none; border: 1px solid var(--accent); padding: 4px 10px; border-radius: 4px;">NotebookLM</a>
        </div>
    </nav>

    <main style="max-width: 900px; margin: 0 auto; padding: 40px 20px;">
        
        <!-- 首页 -->
        <section id="view-home">
            <div style="text-align: center; margin-bottom: 40px;">
                <h1 class="serif" style="font-size: 2.5rem; font-weight: 900; color: var(--fg); margin-bottom: 10px;">让文旅信息触手可及</h1>
                <p style="color: var(--fg-muted);">聚合Tavily全网搜索 × 社交舆情 × AI研判</p>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 30px;">
                <input id="input-kw" type="text" placeholder="输入关键词 (如: 迪士尼、融创、华侨城)" 
                    style="flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--fg); font-size: 16px; outline: none;">
                <button id="btn-search" style="background: var(--accent); color: #000; border: none; padding: 0 24px; border-radius: 8px; font-weight: 700; cursor: pointer;">搜索</button>
            </div>

            <div style="margin-bottom: 20px;">
                <div style="font-size: 12px; color: var(--fg-muted); margin-bottom: 10px;">数据源筛选</div>
                <div id="filters">
                    <!-- 动态生成 -->
                </div>
            </div>

            <div>
                <div style="font-size: 12px; color: var(--fg-muted); margin-bottom: 10px;">快速尝试</div>
                <div id="quicks">
                    <span class="pill" onclick="setKW('上海迪士尼')">上海迪士尼</span>
                    <span class="pill" onclick="setKW('北京环球影城')">北京环球影城</span>
                    <span class="pill" onclick="setKW('珠海长隆')">珠海长隆</span>
                    <span class="pill" onclick="setKW('华侨城集团')">华侨城集团</span>
                </div>
            </div>
        </section>

        <!-- 结果页 -->
        <section id="view-results" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
                <div style="font-size: 14px;"><strong id="kw-display"></strong> - 找到 <span id="count-display" style="color: var(--accent);">0</span> 条</div>
                <div style="display: flex; gap: 10px;">
                    <button id="btn-report" style="background: #2dd4a8; color: #000; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600;">生成报告</button>
                    <button onclick="backHome()" style="background: transparent; border: 1px solid var(--border); color: var(--fg-muted); padding: 8px 16px; border-radius: 6px; cursor: pointer;">返回</button>
                </div>
            </div>
            <div id="cards-box" style="display: grid; grid-template-columns: 1fr; gap: 16px;"></div>
        </section>

        <!-- 报告页 -->
        <section id="view-report" style="display: none;">
            <div style="background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px; flex-wrap: wrap; gap: 10px;">
                    <h2 style="color: var(--accent); font-size: 1.2rem;">综合研判报告</h2>
                    <div>
                        <button onclick="copyReport()" style="background: var(--bg); border: 1px solid var(--border); color: var(--fg); padding: 6px 12px; border-radius: 4px; cursor: pointer;">复制文本</button>
                        <button onclick="feedLM()" style="background: var(--accent); color: #000; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-left: 8px;">投喂 NotebookLM</button>
                    </div>
                </div>
                <div id="report-body"></div>
            </div>
        </section>
    </main>

    <div class="modal" id="detail-modal">
        <div class="modal-content">
            <h3 id="modal-title" style="color: var(--accent); margin-bottom: 12px;"></h3>
            <p id="modal-desc" style="font-size: 14px; line-height: 1.6; color: var(--fg-muted);"></p>
            <a id="modal-link" target="_blank" style="color: var(--accent); font-size: 12px; display: inline-block; margin-top: 12px;">查看原文 <i class="fas fa-external-link-alt"></i></a>
        </div>
    </div>

    <script>
        // 全局状态
        const State = {
            activeFilters: new Set(['wechat', 'xiaohongshu']),
            currentData: null,
            reportHtml: '',
            links: ''
        };

        // DOM 缓存
        const $ = (id) => document.getElementById(id);
        const toast = (msg, type) => {
            const t = document.createElement('div');
            t.className = 'toast ' + type;
            t.innerText = msg;
            $('toast-root').appendChild(t);
            setTimeout(() => t.remove(), 2500);
        };

        // 初始化筛选器
        function initFilters() {
            const list = [
                { key: 'wechat', name: '微信', color: '#07c160' },
                { key: 'xiaohongshu', name: '小红书', color: '#ff2d55' },
                { key: 'douyin', name: '抖音', color: '#000' },
                { key: 'website', name: '官网', color: '#3b82f6' }
            ];
            $('filters').innerHTML = list.map(item => 
                `<span class="pill active" data-key="${item.key}" onclick="toggleFilter(this)" style="border-color:${item.color};color:${item.color}">${item.name}</span>`
            ).join('');
        }

        function toggleFilter(el) {
            const key = el.dataset.key;
            el.classList.toggle('active');
            if (State.activeFilters.has(key)) State.activeFilters.delete(key);
            else State.activeFilters.add(key);
        }

        function setKW(kw) {
            $('input-kw').value = kw;
            doSearch();
        }

        function backHome() {
            $('view-home').style.display = 'block';
            $('view-results').style.display = 'none';
            $('view-report').style.display = 'none';
        }

        // 事件绑定
        $('btn-search').addEventListener('click', doSearch);
        $('input-kw').addEventListener('keydown', e => e.key === 'Enter' && doSearch());
        $('btn-report').addEventListener('click', genReport);

        async function doSearch() {
            const kw = $('input-kw').value.trim();
            if (!kw) return toast('请输入关键词', 'error');

            $('view-home').style.display = 'none';
            $('view-results').style.display = 'block';
            $('view-report').style.display = 'none';
            $('count-display').innerText = '...';
            $('cards-box').innerHTML = '<div style="text-align:center;padding:40px;color:var(--fg-muted);">检索中...</div>';

            try {
                const res = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keyword: kw, activeSources: Array.from(State.activeFilters) })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '请求失败');

                State.currentData = data;
                $('kw-display').innerText = kw;
                $('count-display').innerText = data.tavilyData.results.length;

                if (data.tavilyData.results.length === 0) {
                    $('cards-box').innerHTML = '<div style="text-align:center;padding:40px;color:var(--fg-muted);">未找到公开信息，换个词试试</div>';
                    return;
                }

                $('cards-box').innerHTML = data.tavilyData.results.map(item => `
                    <div class="project-card" style="padding:16px; border-radius:8px; background:var(--card); cursor:pointer;" 
                         onclick='openModal(${JSON.stringify(item).replace(/"/g, '&quot;')})'>
                        <div style="font-weight:600; color:var(--fg); margin-bottom:6px;">${item.title || '无标题'}</div>
                        <div style="font-size:13px; color:var(--fg-muted); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${item.content || ''}</div>
                        <div style="font-size:11px; color:var(--accent); margin-top:8px;">Tavily Source</div>
                    </div>
                `).join('');
            } catch (e) {
                toast('搜索失败: ' + e.message, 'error');
                backHome();
            }
        }

        async function genReport() {
            if (!State.currentData) return;
            
            $('btn-report').disabled = true;
            $('btn-report').innerText = 'AI研判中...';

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        keyword: State.currentData.keyword,
                        tavilyData: State.currentData.tavilyData,
                        socialData: State.currentData.socialData,
                        linkList: State.currentData.linkList
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '生成失败');

                State.reportHtml = data.report;
                State.links = State.currentData.linkList;

                $('view-results').style.display = 'none';
                $('view-report').style.display = 'block';
                $('report-body').innerHTML = data.report;
            } catch (e) {
                toast('生成失败: ' + e.message, 'error');
            } finally {
                $('btn-report').disabled = false;
                $('btn-report').innerText = '生成报告';
            }
        }

        function openModal(itemStr) {
            // 注意：这里需要反向解析，如果上面用了 &quot; 这里需要兼容，或者直接用JSON.parse
            let item;
            try {
                // 假设我们传的是正常JSON字符串
                // 但是html属性里双引号被转义了，这里简单处理，如果报错就用内联数据
                item = JSON.parse(itemStr.replace(/&quot;/g, '"'));
            } catch {
                // Fallback: 如果是从上面模板来的，title和content是直接文本
                const div = document.createElement('div');
                div.innerHTML = itemStr;
                const card = div.querySelector('.project-card') || div;
                item = { title: card.getAttribute('data-title') || '详情', content: card.getAttribute('data-desc') || '' };
            }
            $('modal-title').innerText = item.title || '详情';
            $('modal-desc').innerText = item.content || '暂无描述';
            $('modal-link').href = item.url || '#';
            $('detail-modal').classList.add('show');
        }
        
        // 更好的 openModal 实现 (避免JSON解析问题)
        // 我们修改一下上面 doSearch 里的模板传参方式，改为闭包或者直接赋值给modal
        // 为了保证上面代码不报错，我们在这里修改 openModal 的实现，让它从元素上取数据
        // 但实际上上面代码的 onclick 传入的是JSON字符串，需要解析。
        // 修复：重写 openModal 以解析转义字符
        window.openModal = function(itemStr) {
            try {
                const obj = JSON.parse(itemStr);
                $('modal-title').innerText = obj.title || '详情';
                $('modal-desc').innerText = obj.content || '';
                $('modal-link').href = obj.url || '#';
                $('detail-modal').classList.add('show');
            } catch(e) {
                toast('解析数据失败', 'error');
            }
        };

        document.querySelector('.modal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('show');
        });

        function copyReport() {
            const text = (State.reportHtml || '').replace(/<[^>]*>/g, '') + '\n\n' + State.links;
            navigator.clipboard.writeText(text).then(() => toast('复制成功', 'success')).catch(() => toast('复制失败', 'error'));
        }

        function feedLM() {
            copyReport();
            window.open('https://notebooklm.google.com/', '_blank');
        }

        // 启动
        document.addEventListener('DOMContentLoaded', () => {
            initFilters();
        });
    </script>
</body>
</html>
