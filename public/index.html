<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文旅大视界 - Cultural Panorama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #080c14; --bg-elevated: #0f1520; --card: #141d2e; --card-hover: #1a2540; --border: #1e2d4a; --accent: #d4a24e; --accent-glow: rgba(212,162,78,0.3); --accent2: #2dd4a8; --fg: #e8eaf0; --fg-muted: #7a8ba8; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; overflow-x: hidden; }
        h1, h2, h3, .serif { font-family: 'Noto Serif SC', serif; }
        .grid-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(30,45,74,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(30,45,74,0.3) 1px, transparent 1px); background-size: 60px 60px; }
        .grid-bg::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(212,162,78,0.06) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(45,212,168,0.04) 0%, transparent 40%); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        .search-glow { box-shadow: 0 0 0 1px var(--border), 0 0 40px var(--accent-glow); transition: box-shadow 0.4s; }
        .search-glow:focus-within { box-shadow: 0 0 0 2px var(--accent), 0 0 60px var(--accent-glow), 0 0 120px rgba(212,162,78,0.1); }
        .project-card { transition: all 0.3s ease; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .project-card:hover { border-color: var(--accent); box-shadow: 0 0 30px var(--accent-glow), 0 8px 32px rgba(0,0,0,0.4); transform: translateY(-4px); }
        .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 16px; max-width: 1000px; width: 100%; max-height: 85vh; overflow-y: auto; animation: modalIn 0.3s ease; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .toast-container { position: fixed; top: 80px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
        .toast { padding: 12px 20px; border-radius: 10px; font-size: 14px; color: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.4); animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; display: flex; align-items: center; gap: 8px; }
        .toast.success { background: linear-gradient(135deg, #065f46, #047857); border: 1px solid #10b981; }
        .toast.danger { background: linear-gradient(135deg, #7f1d1d, #b91c1c); border: 1px solid #ef4444; }
        .toast.info { background: linear-gradient(135deg, #1e3a5f, #1e40af); border: 1px solid #3b82f6; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateX(60px); } }

        /* 新增：图片轮播/展示样式 */
        .img-slider { display: flex; overflow-x: auto; gap: 8px; padding-top: 8px; scrollbar-width: thin; }
        .img-slider img { width: 80px; height: 60px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); flex-shrink: 0; }
        .img-placeholder { width: 80px; height: 60px; background: var(--bg); border: 1px dashed var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--fg-muted); font-size: 12px; flex-shrink: 0; }

        /* 新增：报告页防遮挡 */
        #reportSection { padding-top: 100px; } /* 避开导航栏 */
        .report-header-bar { position: sticky; top: 0; background: var(--bg-elevated); padding: 16px 0; margin: -32px -32px 24px -32px; padding-left: 32px; padding-right: 32px; border-bottom: 1px solid var(--border); z-index: 10; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="toast-container" id="toastContainer"></div>

    <!-- 导航栏 -->
    <nav style="position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(8,12,20,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);">
        <div style="max-width:1400px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;">
            <div style="display:flex;align-items:center;gap:12px;">
                <div style="width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#e8c878);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#080c14;" class="serif">文</div>
                <div>
                    <div style="font-size:16px;font-weight:700;letter-spacing:1px;" class="serif">文旅大视界</div>
                    <div style="font-size:10px;color:var(--fg-muted);letter-spacing:2px;">CULTURAL PANORAMA</div>
                </div>
            </div>
        </div>
    </nav>

    <main id="mainContent" style="position:relative;z-index:1;">
        <!-- 1. 首页主体 -->
        <section id="heroSection" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px 40px;transition:all 0.5s ease;">
            <div style="text-align:center;margin-bottom:48px;">
                <div style="font-size:14px;color:var(--accent);letter-spacing:6px;margin-bottom:16px;font-weight:500;">INTELLIGENCE PLATFORM</div>
                <h1 class="serif" style="font-size:3.5rem;font-weight:900;line-height:1.2;margin-bottom:16px;">
                    <span style="color:var(--fg);">文旅</span><span style="color:var(--accent);">大视界</span>
                </h1>
                <p style="font-size:18px;color:var(--fg-muted);max-width:600px;margin:0 auto;line-height:1.8;">
                    聚合文旅部权威标准 × 迈点商业榜单 × Tavily全网洞察
                </p>
            </div>
            
            <div class="search-glow" style="width:min(700px,90%);background:var(--card);border-radius:16px;padding:6px;position:relative;">
                <div style="display:flex;align-items:center;">
                    <i class="fas fa-search" style="padding:0 16px;color:var(--accent);font-size:18px;"></i>
                    <input type="text" id="searchInput" placeholder="输入文旅项目、区位、投资商关键词..." style="flex:1;background:none;border:none;outline:none;color:var(--fg);font-size:16px;padding:14px 0;font-family:inherit;">
                    <button onclick="handleSearchClick()" id="searchBtn" style="padding:14px 28px;background:linear-gradient(135deg,var(--accent),#e8c878);color:#080c14;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;">
                        深度研判
                    </button>
                </div>
            </div>

            <!-- 6. 热门搜索：动态月度榜单 -->
            <div style="margin-top:32px;text-align:center;">
                <div style="font-size:12px;color:var(--fg-muted);margin-bottom:12px;">迈点研究院 · 月度标杆项目榜单 (TOP 10)</div>
                <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;" id="trendingRankings">
                    <!-- 动态渲染位置 -->
                    <span class="tag" style="background:var(--card);color:var(--accent);border:1px solid var(--accent);cursor:pointer;" onclick="quickSearch('大唐不夜城')">1. 大唐不夜城</span>
                    <span class="tag" style="background:var(--card);color:var(--accent2);border:1px solid var(--accent2);cursor:pointer;" onclick="quickSearch('宽窄巷子')">2. 宽窄巷子</span>
                    <span class="tag" style="background:var(--card);color:#f59e0b;border:1px solid #f59e0b;cursor:pointer;" onclick="quickSearch('上海迪士尼')">3. 上海迪士尼</span>
                    <span class="tag" style="background:var(--card);color:#a78bfa;border:1px solid #a78bfa;cursor:pointer;" onclick="quickSearch('长沙文和友')">4. 长沙文和友</span>
                    <span class="tag" style="background:var(--card);color:#10b981;border:1px solid #10b981;cursor:pointer;" onclick="quickSearch('成都熊猫基地')">5. 成都熊猫基地</span>
                </div>
            </div>
        </section>

        <!-- 2. 结果列表 -->
        <section id="resultsSection" style="display:none;padding:80px 20px 60px;max-width:1400px;margin:0 auto;">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:24px;">
                <div style="display:flex;align-items:center;gap:12px;">
                    <button onclick="resetSearch()" style="padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--fg);cursor:pointer;font-family:inherit;font-size:13px;">
                        <i class="fas fa-arrow-left"></i> 返回搜索
                    </button>
                    <div style="font-size:14px;color:var(--fg-muted);">
                        "<span id="searchKeyword" style="color:var(--accent);"></span>" 找到 <span id="resultCount" style="color:var(--accent2);font-weight:600;"></span> 条数据
                    </div>
                </div>
                <button onclick="generateReport()" id="genReportBtn" style="padding:10px 24px;background:var(--accent2);color:#000;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;">
                    <i class="fas fa-chart-bar"></i> 生成研判报告
                </button>
            </div>
            <div id="crawlPanel" style="display:none;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px;">
                <div style="display:flex;align-items:center;gap:12px;font-size:14px;color:var(--fg-muted);">
                    <i class="fas fa-spider" style="color:var(--accent);"></i> 数据采集中... <span id="crawlStatusText"></span>
                </div>
            </div>
            <div id="resultsList" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:24px;"></div>
        </section>

        <!-- 3. 报告页 -->
        <section id="reportSection" style="display:none;padding:0 20px 60px;max-width:1400px;margin:0 auto;">
            <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;">
                <!-- 新增：报告页固定返回栏 -->
                <div class="report-header-bar">
                    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;">
                        <button onclick="resetSearch()" style="display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--fg);cursor:pointer;font-family:inherit;font-size:13px;">
                            <i class="fas fa-arrow-left"></i> 返回搜索页
                        </button>
                        <div style="font-size:12px;color:var(--fg-muted);">
                            "<span id="reportMeta" style="color:var(--accent);"></span>" · 阿里云百炼生成
                        </div>
                        <div style="display:flex;gap:10px;">
                            <button onclick="copyReport()" style="padding:8px 16px;background:var(--bg);border:1px solid var(--accent);border-radius:8px;color:var(--accent);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;">复制文本</button>
                            <button onclick="feedToNotebookLM()" style="padding:8px 16px;background:var(--accent);color:#000;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;">投喂 NotebookLM</button>
                        </div>
                    </div>
                </div>
                
                <div id="reportContent" style="padding:32px;line-height:1.9;font-size:15px;"></div>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeModal()">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        const activeSources = new Set(['wechat', 'xiaohongshu']);
        let searchData = null, reportData = null, linksData = '';
        const $ = id => document.getElementById(id);
        let els = {};

        const toast = (msg, type='info') => {
            const c = $('toastContainer'), d = document.createElement('div');
            d.className = 'toast ' + type; d.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
            c.appendChild(d); setTimeout(() => d.remove(), 3000);
        };
        const openModal = item => {
            $('modalContent').innerHTML = `<div style="padding:24px"><h3 style="color:var(--accent);margin-bottom:12px">${item.title||''}</h3><div style="font-size:12px;color:var(--fg-muted);margin-bottom:12px;">${item.source || '未知来源'}</div><p style="font-size:13px;color:var(--fg-muted);line-height:1.6">${item.content||''}</p><a href="${item.url||'#'}" target="_blank" style="color:var(--accent2)">查看原文</a></div>`;
            $('detailModal').classList.add('show');
        };
        const closeModal = () => $('detailModal').classList.remove('show');

        function init() {
            els = { home:$('heroSection'), res:$('resultsSection'), rep:$('reportSection'),
                input:$('searchInput'), kw:$('searchKeyword'), cnt:$('resultCount'),
                list:$('resultsList'), panel:$('crawlPanel'), stat:$('crawlStatusText'),
                meta:$('reportMeta'), body:$('reportContent'), btn:$('genReportBtn') };
            els.input.addEventListener('keydown', e => { if(e.key==='Enter') handleSearch(); });
        }

        // 清除旧的平台标签逻辑（需求5）
        function renderSourceTags() { /* 留空，不再渲染 */ }

        function resetSearch() {
            els.home.style.display='flex'; els.res.style.display='none'; els.rep.style.display='none';
            window.scrollTo({top:0,behavior:'smooth'});
        }
        function quickSearch(k) { els.input.value = k; handleSearch(); }
        function handleSearchClick() { handleSearch(); }

        async function handleSearch() {
            const kw = els.input.value.trim();
            if(!kw) return toast('请输入关键词','warning');
            
            els.home.style.display='none'; els.res.style.display='block'; els.rep.style.display='none';
            els.kw.innerText=kw; els.cnt.innerText='...'; els.list.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--fg-muted);"><i class="fas fa-spinner fa-spin"></i> 正在全网抓取数据...</div>';
            els.panel.style.display='block'; els.stat.innerText='请求Tavily与社交接口...';

            try {
                const r = await fetch('/api/search', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({keyword:kw, activeSources:Array.from(activeSources)})
                });
                const d = await r.json();
                if(!r.ok) throw new Error(d.error||'请求失败');
                
                searchData = d;
                const items = d.tavilyData?.results || [];
                els.cnt.innerText = items.length;
                els.panel.style.display='none';

                if(items.length===0){
                    els.list.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--fg-muted);">未检索到公开结果，请更换关键词</div>';
                    return;
                }

                // 7. 新增：图片展示逻辑
                els.list.innerHTML = items.map(p => {
                    const imgs = p.image || (p.images && p.images.length > 0) ? (p.image ? [p.image] : p.images.slice(0,5)) : [];
                    const imgHtml = imgs.length > 0 
                        ? `<div class="img-slider">${imgs.map(src => `<img src="${src}" alt="项目图" onerror="this.style.display='none'">`).join('')}</div>`
                        : `<div class="img-slider"><div class="img-placeholder">无实拍图</div></div>`;

                    return `
                    <div class="project-card bg-[var(--card)] rounded-xl overflow-hidden cursor-pointer" onclick='openModal(${JSON.stringify(p).replace(/"/g,"&quot;")})'>
                        ${imgHtml}
                        <div style="padding:16px;">
                            <div style="font-weight:700;color:var(--fg);margin-bottom:6px;font-size:15px;">${p.title||'Untitled'}</div>
                            <div style="font-size:12px;color:var(--fg-muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${p.content||''}</div>
                            <div style="margin-top:8px;font-size:11px;color:var(--accent);">Tavily Source</div>
                        </div>
                    </div>`;
                }).join('');
            } catch(e) {
                console.error(e);
                els.panel.style.display='none';
                toast('搜索失败: '+e.message,'danger');
            }
        }

        async function generateReport() {
            if(!searchData) return toast('请先搜索','warning');
            els.btn.disabled=true; els.btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> 生成中...';
            try {
                const r = await fetch('/api/analyze', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({
                        keyword:searchData.keyword,
                        tavilyData:searchData.tavilyData,
                        socialData:searchData.socialData,
                        linkList:searchData.linkList
                    })
                });
                const d = await r.json();
                if(!r.ok) throw new Error(d.error||'生成失败');
                
                reportData = d.report;
                linksData = searchData.linkList;
                els.res.style.display='none'; els.rep.style.display='block';
                els.body.innerHTML = d.report;
                els.meta.innerText = searchData.keyword;
                window.scrollTo({top:0,behavior:'smooth'});
                toast('研判报告生成成功','success');
            } catch(e) {
                toast('生成失败: '+e.message,'danger');
            } finally {
                els.btn.disabled=false; els.btn.innerHTML='<i class="fas fa-chart-bar"></i> 生成研判报告';
            }
        }

        function copyReport() {
            const txt = (reportData||'').replace(/<[^>]*>/g,'') + "\n\n===== LINKS =====\n" + (linksData||'');
            navigator.clipboard.writeText(txt).then(()=>toast('复制成功','success')).catch(()=>toast('复制失败','danger'));
        }
        function feedToNotebookLM() { copyReport(); window.open('https://notebooklm.google.com/','_blank'); }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
